{% extends 'main/base.html' %}
{% block title %}Склады{% endblock %}
{% block page_title %}Склады{% endblock %}
{% block content %}
<a class="btn" href="/sites/create/">Создать склад</a>
<table>
<tr><th>Название</th><th>Код</th><th>Активен</th><th></th></tr>
{% for s in sites %}<tr><td>{{ s.name }}</td><td>{{ s.code|default:'—' }}</td><td>{{ s.is_active|yesno:'Да,Нет' }}</td><td><a href="/sites/{{ s.id }}/edit/">Редактировать</a></td></tr>{% endfor %}
</table>
{% endblock %}
