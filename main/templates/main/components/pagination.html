{% if page_obj and page_obj.paginator.num_pages > 1 %}
<div class="pagination">
  {% if page_obj.has_previous %}
  <a class="btn btn-secondary" href="?{% for key, value in request.GET.items %}{% if key != 'page' %}{{ key }}={{ value|urlencode }}&{% endif %}{% endfor %}page={{ page_obj.previous_page_number }}">Назад</a>
  {% endif %}
  <span class="meta">Страница {{ page_obj.number }} / {{ page_obj.paginator.num_pages }}</span>
  {% if page_obj.has_next %}
  <a class="btn btn-secondary" href="?{% for key, value in request.GET.items %}{% if key != 'page' %}{{ key }}={{ value|urlencode }}&{% endif %}{% endfor %}page={{ page_obj.next_page_number }}">Вперёд</a>
  {% endif %}
</div>
{% endif %}
