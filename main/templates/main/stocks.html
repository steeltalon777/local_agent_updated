{% extends 'main/base.html' %}
{% block title %}Остатки{% endblock %}
{% block page_title %}Остатки{% endblock %}
{% block content %}
<form method="get" class="card">
    <input type="text" name="q" value="{{ q }}" placeholder="Поиск по ТМЦ/SKU">
    <input type="hidden" name="sort" value="{{ sort|default:'item' }}" />
    <input type="hidden" name="dir" value="{{ dir|default:'asc' }}" />
    <button class="btn" type="submit">Найти</button>
</form>
<table>
    <tr>
        <th><a href="?q={{ q|urlencode }}&sort=item&dir={% if sort == 'item' and dir == 'asc' %}desc{% else %}asc{% endif %}">ТМЦ</a></th>
        <th><a href="?q={{ q|urlencode }}&sort=qty&dir={% if sort == 'qty' and dir == 'asc' %}desc{% else %}asc{% endif %}">Остаток</a></th>
        <th><a href="?q={{ q|urlencode }}&sort=unit&dir={% if sort == 'unit' and dir == 'asc' %}desc{% else %}asc{% endif %}">Ед.изм</a></th>
    </tr>
{% for row in stock_rows %}
<tr><td>{{ row.item.name }}</td><td>{{ row.quantity|floatformat:2 }}</td><td>{{ row.unit }}</td></tr>
{% empty %}<tr><td colspan="3">Нет данных</td></tr>{% endfor %}
</table>
{% endblock %}
