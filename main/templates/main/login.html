{% extends 'main/base.html' %}
{% block title %}Вход{% endblock %}
{% block public_content %}
<div class="auth-page">
  <div class="auth-card">
    <h1 class="auth-title">Складской контур</h1>
    <p class="auth-subtitle">Вход во внутреннюю систему учёта</p>
    {% if form.errors %}
      <div class="alert alert-error">Неверный логин или пароль.</div>
    {% endif %}
    <form method="post" class="content-stack">{% csrf_token %}
      <div class="field">
        <label for="id_username">Логин</label>
        <input id="id_username" type="text" name="username" required autofocus>
      </div>
      <div class="field">
        <label for="id_password">Пароль</label>
        <input id="id_password" type="password" name="password" required>
      </div>
      <button class="btn btn-primary" type="submit">Войти</button>
    </form>
  </div>
</div>
{% endblock %}
