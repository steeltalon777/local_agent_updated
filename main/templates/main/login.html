<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Вход</title></head>
<body style="font-family:Arial;max-width:420px;margin:40px auto;">
<h2>Вход в систему</h2>
{% if form.errors %}<p style="color:red;">Неверный логин или пароль</p>{% endif %}
<form method="post">{% csrf_token %}
<p>Логин: <input type="text" name="username" required></p>
<p>Пароль: <input type="password" name="password" required></p>
<button type="submit">Войти</button>
</form>
</body></html>
