services:
  web:
    build: .
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - appdata:/app/data
    command: >
      sh -c "
      python manage.py migrate &&
      python manage.py collectstatic --noinput &&
      gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 60
      "
    restart: unless-stopped

volumes:
  appdata: