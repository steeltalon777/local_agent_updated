version: '3.8'

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: local_agent
      POSTGRES_USER: local_agent
      POSTGRES_PASSWORD: local_agent_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U local_agent -d local_agent"]
      interval: 5s
      timeout: 5s
      retries: 20

  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - DEBUG=1
      - PYTHONUNBUFFERED=1
      - POSTGRES_DB=local_agent
      - POSTGRES_USER=local_agent
      - POSTGRES_PASSWORD=local_agent_pass
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
    depends_on:
      db:
        condition: service_healthy


volumes:
  pgdata:
